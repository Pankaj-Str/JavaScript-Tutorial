<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <script>

        function show(){

            a = prompt("Enter Your number 1 ")
            b = prompt("Enter Your number 2")

            c = +a + +b

            alert(c)
            //document.write("welcome")
        }


        function get_input(){
            Name = prompt("Enter Your Name")
            Age = prompt("Enter Your Age")
            Height = prompt("Enter Your Height")
            document.write("Your Name is = ",Name,"<hr>")
            document.write("Your Age is = ",Age,"<hr>")
            document.write("Your Height is = ",Height,"<hr>")
        }

    </script>



</head>
<body>
    
    <button onclick="show()">Click</button>

    <button onclick="get_input()">Input Name</button>


</body>
</html>
