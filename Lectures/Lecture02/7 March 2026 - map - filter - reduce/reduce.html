    <title>Document</title>

    <script>

        // reduce()

        data = [12,23,34,45,56,67,78,89,90]

        function sum(x,y){
            return x+y
        }

        console.log(data.reduce(sum)) // array_name.reduce(user_defined_function)



        // for loop 
        total = 0;
        for(let i=0; i<data.length; i++){
            total = total + data[i]           
        }

        console.log(total)

    </script>
